apiVersion: v1
kind: Secret
metadata:
  name: milo-kubeconfig
  namespace: support-system
type: Opaque
stringData:
  kubeconfig: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: milo
        cluster:
          server: https://milo-apiserver.milo-system.svc.cluster.local:6443
          insecure-skip-tls-verify: true
    users:
      - name: support-apiserver
        user:
          token: test-admin-token
    contexts:
      - name: default
        context:
          cluster: milo
          user: support-apiserver
    current-context: default
